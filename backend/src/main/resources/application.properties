server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:smart_campus;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=false

app.admin.name=admin
app.admin.email=admin@gmail.com
app.admin.password=Admin@1

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

app.oauth2.frontend-success-url=http://localhost:5173/