server.port=8081

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_campus?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for testing - disable in production)
spring.h2.console.enabled=false

# Admin Credentials
app.admin.name=admin
app.admin.email=admin@gmail.com
app.admin.password=Admin@1

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:850710233368-q5uka41urme4hltn7589b29jdin5ct19.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com

# OAuth2 Frontend Configuration
app.oauth2.frontend-success-url=${OAUTH2_FRONTEND_SUCCESS_URL:http://localhost:5173/login}
app.oauth2.frontend-failure-url=${OAUTH2_FRONTEND_FAILURE_URL:http://localhost:5173/login?error=true}

# Logging Configuration
logging.level.root=INFO
logging.level.com.campus.smart=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
